<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomsday - Positive News</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .news-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .news-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .subreddit {
            font-size: 0.8em;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container news-container">
        <h1 class="text-center mb-4">Bloomsday</h1>
        <p class="text-center">A subreddit for positive news and progress in the world.</p>
        
        <div id="news-list">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p>Loading positive news...</p>
            </div>
        </div>
    </div>

    <script>
        // Fetch positive news from the backend
        fetch('/api/news')
            .then(response => response.json())
            .then(data => {
                const newsList = document.getElementById('news-list');
                newsList.innerHTML = '';
                
                if (data.length === 0) {
                    newsList.innerHTML = '<p class="text-center">No positive news found. Try again later!</p>';
                    return;
                }
                
                data.forEach(news => {
                    const newsItem = document.createElement('div');
                    newsItem.className = 'news-item';
                    newsItem.innerHTML = `
                        <h5><a href="${news.url}" target="_blank">${news.title}</a></h5>
                        <p class="subreddit">Posted in r/${news.subreddit} | ⬆️ ${news.score}</p>
                    `;
                    newsList.appendChild(newsItem);
                });
            })
            .catch(error => {
                document.getElementById('news-list').innerHTML =
                    '<p class="text-center text-danger">Failed to load news. Please try again later.</p>';
            });
    </script>
</body>
</html>
